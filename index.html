<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="description" content="PDF를 실제 책처럼 넘겨볼 수 있는 플립북 뷰어">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="플립북">
  
  <title>PDF 플립북 플랫폼</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/lucide-react"></script>
  
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
      background-color: #f8fafc;
    }
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div style="text-align: center; color: white; font-family: sans-serif;">
      <div style="font-size: 80px; margin-bottom: 20px;">📚</div>
      <h1 style="font-size: 32px; font-weight: bold;">PDF 플립북</h1>
      <p style="margin-top: 10px; opacity: 0.9;">로딩중...</p>
    </div>
  </div>
  
  <div id="root"></div>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    // lucide 대신 lucideReact 컴포넌트를 추출합니다.
    const { Upload, ChevronLeft, ChevronRight, Trash2, BookOpen, Plus } = lucideReact;

    const StorageManager = {
      async list(prefix) {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith(prefix)) {
            keys.push(key);
          }
        }
        return { keys };
      },
      
      async get(key) {
        const value = localStorage.getItem(key);
        return value ? { value } : null;
      },
      
      async set(key, value) {
        try {
          localStorage.setItem(key, value);
          return { key, value };
        } catch (e) {
          console.error('저장 실패:', e);
          alert('저장 공간이 부족합니다. (로컬 스토리지는 보통 5MB로 제한됩니다.)');
          return null;
        }
      },
      
      async delete(key) {
        localStorage.removeItem(key);
        return { key, deleted: true };
      }
    };

    function PDFFlipbookPlatform() {
      const [mode, setMode] = useState('list');
      const [pdfList, setPdfList] = useState([]);
      const [selectedPdf, setSelectedPdf] = useState(null);
      const [pages, setPages] = useState([]);
      const [currentSpread, setCurrentSpread] = useState(0);
      const [isFlipping, setIsFlipping] = useState(false);
      const [flipDirection, setFlipDirection] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [dragProgress, setDragProgress] = useState(0);
      const [loading, setLoading] = useState(true);
      const fileInputRef = useRef(null);
      const dragStartX = useRef(0);

      useEffect(() => {
        loadPdfList();
      }, []);

      const loadPdfList = async () => {
        try {
          setLoading(true);
          const result = await StorageManager.list('pdf:');
          const pdfs = [];
          for (const key of result.keys) {
            const data = await StorageManager.get(key);
            if (data && data.value) {
              pdfs.push(JSON.parse(data.value));
            }
          }
          setPdfList(pdfs.sort((a, b) => b.uploadedAt - a.uploadedAt));
        } catch (error) {
          console.error('PDF 목록 로드 실패:', error);
        } finally {
          setLoading(false);
        }
      };

      const handleAdminUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') {
          alert('PDF 파일을 선택해주세요.');
          return;
        }

        try {
          setLoading(true);
          const reader = new FileReader();
          reader.onload = async (event) => {
            const base64Data = event.target.result.split(',')[1];
            const pdfId = `pdf:${Date.now()}`;
            const pdfInfo = {
              id: pdfId,
              key: pdfId,
              name: file.name,
              size: file.size,
              uploadedAt: Date.now(),
              data: base64Data
            };

            const result = await StorageManager.set(pdfId, JSON.stringify(pdfInfo));
            if (result) {
              alert('성공적으로 등록되었습니다!');
              await loadPdfList();
              setMode('list');
            }
            setLoading(false);
          };
          reader.readAsDataURL(file);
        } catch (error) {
          alert('등록에 실패했습니다.');
          setLoading(false);
        }
      };

      const handleDelete = async (e, pdfKey) => {
        e.stopPropagation();
        if (!confirm('정말 삭제하시겠습니까?')) return;
        await StorageManager.delete(pdfKey);
        await loadPdfList();
      };

      const handleViewPdf = async (pdf) => {
        try {
          setLoading(true);
          setSelectedPdf(pdf);
          
          const binaryData = atob(pdf.data);
          const bytes = new Uint8Array(binaryData.length);
          for (let i = 0; i < binaryData.length; i++) {
            bytes[i] = binaryData.charCodeAt(i);
          }
          
          await loadPdfPages(bytes);
          setMode('viewer');
          setCurrentSpread(0);
        } catch (error) {
          alert('PDF 로딩 오류');
        } finally {
          setLoading(false);
        }
      };

      const loadPdfPages = async (fileData) => {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const loadingTask = pdfjsLib.getDocument({ data: fileData });
        const pdf = await loadingTask.promise;
        const pageImages = [];

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.width = viewport.width;
          canvas.height = viewport.height;

          await page.render({ canvasContext: context, viewport: viewport }).promise;
          pageImages.push(canvas.toDataURL('image/jpeg', 0.8));
        }
        setPages(pageImages);
      };

      const getMaxSpread = () => Math.ceil((pages.length - 1) / 2);

      const nextPage = () => {
        if (currentSpread < getMaxSpread() && !isFlipping) {
          setFlipDirection('next');
          setIsFlipping(true);
          setTimeout(() => {
            setCurrentSpread(s => s + 1);
            setIsFlipping(false);
            setFlipDirection(null);
          }, 600);
        }
      };

      const prevPage = () => {
        if (currentSpread > 0 && !isFlipping) {
          setFlipDirection('prev');
          setIsFlipping(true);
          setTimeout(() => {
            setCurrentSpread(s => s - 1);
            setIsFlipping(false);
            setFlipDirection(null);
          }, 600);
        }
      };

      if (mode === 'list') {
        return (
          <div className="min-h-screen p-4 md:p-8">
            <div className="max-w-6xl mx-auto">
              <div className="flex justify-between items-center mb-8">
                <div className="flex items-center gap-3">
                  <BookOpen className="text-indigo-600 w-8 h-8" />
                  <h1 className="text-2xl font-bold">내 플립북 서재</h1>
                </div>
                <button 
                  onClick={() => setMode('admin')}
                  className="bg-indigo-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-indigo-700 transition"
                >
                  <Plus size={20} /> PDF 등록
                </button>
              </div>

              {loading ? (
                <div className="text-center py-20">로딩 중...</div>
              ) : pdfList.length === 0 ? (
                <div className="text-center py-20 bg-white rounded-xl border-2 border-dashed">
                  <p className="text-gray-500">등록된 PDF가 없습니다. 새로운 파일을 추가해보세요!</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                  {pdfList.map(pdf => (
                    <div key={pdf.key} className="bg-white p-4 rounded-xl shadow-md hover:shadow-lg transition cursor-pointer border border-gray-100" onClick={() => handleViewPdf(pdf)}>
                      <div className="flex justify-between items-start mb-4">
                        <div className="bg-indigo-50 p-3 rounded-lg"><BookOpen className="text-indigo-600" /></div>
                        <button onClick={(e) => handleDelete(e, pdf.key)} className="text-gray-400 hover:text-red-500 p-1"><Trash2 size={18} /></button>
                      </div>
                      <h3 className="font-semibold text-gray-800 truncate">{pdf.name}</h3>
                      <p className="text-xs text-gray-400 mt-1">{(pdf.size / 1024 / 1024).toFixed(2)} MB</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      }

      if (mode === 'admin') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
              <div className="bg-indigo-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <Upload className="text-indigo-600 w-10 h-10" />
              </div>
              <h2 className="text-2xl font-bold mb-2">새 PDF 업로드</h2>
              <p className="text-gray-500 mb-8">브라우저 로컬 저장소에 PDF를 보관합니다.</p>
              
              <input ref={fileInputRef} type="file" accept="application/pdf" className="hidden" onChange={handleAdminUpload} />
              
              <button 
                onClick={() => fileInputRef.current.click()}
                disabled={loading}
                className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 disabled:bg-gray-400 mb-4"
              >
                {loading ? '처리 중...' : '파일 선택하기'}
              </button>
              <button onClick={() => setMode('list')} className="text-gray-500 hover:underline">취소</button>
            </div>
          </div>
        );
      }

      // Viewer Mode
      return (
        <div className="min-h-screen bg-zinc-900 text-white flex flex-col items-center justify-center p-4">
          <div className="absolute top-6 left-6 flex items-center gap-4">
            <button onClick={() => setMode('list')} className="bg-white/10 hover:bg-white/20 p-2 rounded-full transition">
              <ChevronLeft />
            </button>
            <h2 className="font-medium truncate max-w-[200px]">{selectedPdf?.name}</h2>
          </div>

          <div className="relative mt-12 flex items-center justify-center" style={{ perspective: '2000px' }}>
             {/* 플립북 컨텐츠 영역 */}
             <div className="flex shadow-2xl">
                {currentSpread > 0 && (
                  <div className="bg-white overflow-hidden" style={{ width: '40vw', maxWidth: '400px', aspectRatio: '0.7', borderRight: '1px solid #ddd' }}>
                    <img src={pages[currentSpread * 2 - 1]} className="w-full h-full object-contain" />
                  </div>
                )}
                <div 
                  className={`bg-white overflow-hidden transition-transform duration-500 ${isFlipping ? 'z-50' : ''}`}
                  style={{ 
                    width: currentSpread === 0 ? '80vw' : '40vw', 
                    maxWidth: currentSpread === 0 ? '500px' : '400px', 
                    aspectRatio: currentSpread === 0 ? '0.7' : '0.7',
                    transformOrigin: 'left center',
                    transform: isFlipping && flipDirection === 'next' ? 'rotateY(-180deg)' : 'none'
                  }}
                >
                  <img src={pages[currentSpread === 0 ? 0 : currentSpread * 2]} className="w-full h-full object-contain" />
                </div>
             </div>

             {/* 네비게이션 버튼 */}
             <button onClick={prevPage} disabled={currentSpread === 0} className="absolute -left-16 p-4 disabled:opacity-20"><ChevronLeft size={40}/></button>
             <button onClick={nextPage} disabled={currentSpread >= getMaxSpread()} className="absolute -right-16 p-4 disabled:opacity-20"><ChevronRight size={40}/></button>
          </div>
          
          <div className="mt-8 text-sm text-gray-400">
            {currentSpread === 0 ? '표지' : `${currentSpread * 2} - ${currentSpread * 2 + 1}`} / {pages.length} 페이지
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PDFFlipbookPlatform />);
    
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hidden');
      }, 1000);
    });
  </script>
</body>
</html>
