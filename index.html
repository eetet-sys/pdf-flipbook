<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <title>PDF 플립북 플랫폼</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #f3f4f6; font-family: sans-serif; }
    #splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .page-shadow { box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div id="splash">
    <div style="text-align: center; color: white;">
      <div style="font-size: 60px; margin-bottom: 20px;">📚</div>
      <h1 style="font-size: 24px; font-weight: bold;">PDF 플립북 로딩 중...</h1>
    </div>
  </div>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // 라이브러리 충돌을 피하기 위해 간단한 아이콘 컴포넌트를 직접 정의하거나 이모지를 사용합니다.
    const Icons = {
      Upload: () => <span>📤</span>,
      ChevronLeft: () => <span>◀</span>,
      ChevronRight: () => <span>▶</span>,
      Trash: () => <span>🗑️</span>,
      Book: () => <span>📖</span>,
      Plus: () => <span>➕</span>
    };

    const StorageManager = {
      list: async () => {
        const p = [];
        for(let i=0; i<localStorage.length; i++) {
          const k = localStorage.key(i);
          if(k.startsWith('pdf:')) p.push(JSON.parse(localStorage.getItem(k)));
        }
        return p;
      },
      save: (data) => localStorage.setItem(data.id, JSON.stringify(data)),
      remove: (id) => localStorage.removeItem(id)
    };

    function App() {
      const [mode, setMode] = useState('list');
      const [pdfs, setPdfs] = useState([]);
      const [pages, setPages] = useState([]);
      const [currentPdf, setCurrentPdf] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        refreshList();
        setTimeout(() => document.getElementById('splash').classList.add('hidden'), 800);
      }, []);

      const refreshList = async () => setPdfs(await StorageManager.list());

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setLoading(true);
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const id = `pdf:${Date.now()}`;
          const data = {
            id, name: file.name, 
            data: ev.target.result.split(',')[1],
            date: new Date().toLocaleString()
          };
          StorageManager.save(data);
          await refreshList();
          setLoading(false);
          setMode('list');
        };
        reader.readAsDataURL(file);
      };

      const openPdf = async (pdf) => {
        setLoading(true);
        try {
          const bin = atob(pdf.data);
          const uint8 = new Uint8Array(bin.length);
          for(let i=0; i<bin.length; i++) uint8[i] = bin.charCodeAt(i);
          
          const pdfjs = window['pdfjs-dist/build/pdf'];
          pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          
          const doc = await pdfjs.getDocument({data: uint8}).promise;
          const imgs = [];
          for(let i=1; i<=doc.numPages; i++) {
            const page = await doc.getPage(i);
            const viewport = page.getViewport({scale: 1.5});
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({canvasContext: ctx, viewport}).promise;
            imgs.push(canvas.toDataURL('image/jpeg', 0.8));
          }
          setPages(imgs);
          setCurrentPdf(pdf);
          setCurrentPage(0);
          setMode('view');
        } catch(e) { alert("PDF 로드 실패"); }
        setLoading(false);
      };

      if (mode === 'list') return (
        <div className="p-6 max-w-4xl mx-auto">
          <div className="flex justify-between items-center mb-8">
            <h1 className="text-2xl font-bold flex items-center gap-2"><Icons.Book/> 내 서재</h1>
            <button onClick={() => setMode('add')} className="bg-indigo-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-indigo-700">
              <Icons.Plus/> 등록
            </button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {pdfs.map(p => (
              <div key={p.id} onClick={() => openPdf(p)} className="bg-white p-4 rounded-xl shadow cursor-pointer hover:border-indigo-500 border-2 border-transparent transition">
                <div className="flex justify-between items-start">
                  <span className="font-semibold truncate w-3/4">{p.name}</span>
                  <button onClick={(e) => { e.stopPropagation(); StorageManager.remove(p.id); refreshList(); }} className="text-gray-400 hover:text-red-500"><Icons.Trash/></button>
                </div>
                <div className="text-xs text-gray-400 mt-2">{p.date}</div>
              </div>
            ))}
          </div>
        </div>
      );

      if (mode === 'add') return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
            <div className="text-4xl mb-4"><Icons.Upload/></div>
            <h2 className="text-xl font-bold mb-4">새 PDF 추가</h2>
            <input type="file" accept=".pdf" onChange={handleFileUpload} className="hidden" id="file" />
            <label htmlFor="file" className="block w-full bg-indigo-600 text-white py-3 rounded-xl cursor-pointer hover:bg-indigo-700 mb-4">
              {loading ? '업로드 중...' : '파일 선택'}
            </label>
            <button onClick={() => setMode('list')} className="text-gray-500">돌아가기</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-zinc-800 flex flex-col items-center justify-center p-4">
          <button onClick={() => setMode('list')} className="absolute top-4 left-4 text-white bg-white/10 px-4 py-2 rounded-lg">닫기</button>
          
          <div className="flex items-center gap-4 max-w-full">
            <button onClick={() => setCurrentPage(p => Math.max(0, p-1))} className="text-white text-3xl opacity-50 hover:opacity-100"><Icons.ChevronLeft/></button>
            
            <div className="bg-white page-shadow relative" style={{width: 'min(90vw, 500px)', aspectRatio: '0.7'}}>
              <img src={pages[currentPage]} className="w-full h-full object-contain" />
              <div className="absolute bottom-2 right-4 text-[10px] text-gray-400">{currentPage + 1} / {pages.length}</div>
            </div>

            <button onClick={() => setCurrentPage(p => Math.min(pages.length-1, p+1))} className="text-white text-3xl opacity-50 hover:opacity-100"><Icons.ChevronRight/></button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
