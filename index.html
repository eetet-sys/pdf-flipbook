<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="description" content="PDF를 실제 책처럼 넘겨볼 수 있는 플립북 뷰어">
  
  <!-- iOS 지원 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="플립북">
  
  <title>PDF 플립북 플랫폼</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- 스플래시 화면 -->
  <div id="splash">
    <div style="text-align: center; color: white;">
      <div style="font-size: 80px; margin-bottom: 20px;">📚</div>
      <h1 style="font-size: 32px; font-weight: bold;">PDF 플립북</h1>
      <p style="margin-top: 10px; opacity: 0.9;">로딩중...</p>
    </div>
  </div>
  
  <div id="root"></div>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- React App -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { Upload, ChevronLeft, ChevronRight, Trash2, BookOpen, Plus } = lucide;

    // LocalStorage를 사용한 간단한 저장소
    const StorageManager = {
      async list(prefix) {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key.startsWith(prefix)) {
            keys.push(key);
          }
        }
        return { keys };
      },
      
      async get(key) {
        const value = localStorage.getItem(key);
        return value ? { value } : null;
      },
      
      async set(key, value) {
        try {
          localStorage.setItem(key, value);
          return { key, value };
        } catch (e) {
          console.error('저장 실패:', e);
          alert('저장 공간이 부족합니다. 일부 PDF를 삭제해주세요.');
          return null;
        }
      },
      
      async delete(key) {
        localStorage.removeItem(key);
        return { key, deleted: true };
      }
    };

    function PDFFlipbookPlatform() {
      const [mode, setMode] = useState('list');
      const [pdfList, setPdfList] = useState([]);
      const [selectedPdf, setSelectedPdf] = useState(null);
      const [pages, setPages] = useState([]);
      const [currentSpread, setCurrentSpread] = useState(0);
      const [isFlipping, setIsFlipping] = useState(false);
      const [flipDirection, setFlipDirection] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [dragProgress, setDragProgress] = useState(0);
      const [loading, setLoading] = useState(true);
      const fileInputRef = useRef(null);
      const containerRef = useRef(null);
      const dragStartX = useRef(0);

      useEffect(() => {
        loadPdfList();
      }, []);

      const loadPdfList = async () => {
        try {
          setLoading(true);
          const result = await StorageManager.list('pdf:');
          if (result && result.keys) {
            const pdfs = [];
            for (const key of result.keys) {
              try {
                const data = await StorageManager.get(key);
                if (data && data.value) {
                  const pdfInfo = JSON.parse(data.value);
                  pdfs.push({ key, ...pdfInfo });
                }
              } catch (e) {
                console.error('PDF 로드 오류:', e);
              }
            }
            setPdfList(pdfs.sort((a, b) => b.uploadedAt - a.uploadedAt));
          }
        } catch (error) {
          console.error('PDF 목록 로드 실패:', error);
        } finally {
          setLoading(false);
        }
      };

      const handleAdminUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') {
          alert('PDF 파일을 선택해주세요.');
          return;
        }

        try {
          setLoading(true);
          
          const reader = new FileReader();
          reader.onload = async (event) => {
            const base64Data = event.target.result.split(',')[1];
            
            const pdfId = `pdf:${Date.now()}`;
            const pdfInfo = {
              id: pdfId,
              name: file.name,
              size: file.size,
              uploadedAt: Date.now(),
              data: base64Data
            };

            const result = await StorageManager.set(pdfId, JSON.stringify(pdfInfo));
            if (result) {
              alert('PDF가 성공적으로 업로드되었습니다!');
              await loadPdfList();
              setMode('list');
            }
            setLoading(false);
          };
          
          reader.onerror = () => {
            alert('파일을 읽는데 실패했습니다.');
            setLoading(false);
          };
          
          reader.readAsDataURL(file);
        } catch (error) {
          console.error('업로드 오류:', error);
          alert('PDF 업로드에 실패했습니다.');
          setLoading(false);
        }
      };

      const handleDelete = async (pdfKey) => {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        
        try {
          await StorageManager.delete(pdfKey);
          alert('삭제되었습니다.');
          await loadPdfList();
        } catch (error) {
          console.error('삭제 오류:', error);
          alert('삭제에 실패했습니다.');
        }
      };

      const handleViewPdf = async (pdf) => {
        try {
          setLoading(true);
          setSelectedPdf(pdf);
          
          const base64Data = pdf.data;
          const binaryData = atob(base64Data);
          const bytes = new Uint8Array(binaryData.length);
          for (let i = 0; i < binaryData.length; i++) {
            bytes[i] = binaryData.charCodeAt(i);
          }
          
          await loadPdfPages(bytes);
          setMode('viewer');
          setCurrentSpread(0);
        } catch (error) {
          console.error('PDF 열기 오류:', error);
          alert('PDF를 여는데 실패했습니다.');
        } finally {
          setLoading(false);
        }
      };

      const loadPdfPages = async (fileData) => {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const loadingTask = pdfjsLib.getDocument({ data: fileData });
        const pdf = await loadingTask.promise;
        const numPages = pdf.numPages;
        const pageImages = [];

        for (let i = 1; i <= numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 2 });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.width = viewport.width;
          canvas.height = viewport.height;

          await page.render({
            canvasContext: context,
            viewport: viewport
          }).promise;

          pageImages.push(canvas.toDataURL());
        }

        setPages(pageImages);
      };

      const getLeftPage = () => {
        if (currentSpread === 0) return null;
        return pages[currentSpread * 2 - 1];
      };

      const getRightPage = () => {
        if (currentSpread === 0) return pages[0];
        return pages[currentSpread * 2];
      };

      const getMaxSpread = () => {
        if (pages.length <= 1) return 0;
        return Math.ceil((pages.length - 1) / 2);
      };

      const nextPage = () => {
        if (currentSpread < getMaxSpread() && !isFlipping) {
          setFlipDirection('next');
          setIsFlipping(true);
          setTimeout(() => {
            setCurrentSpread(currentSpread + 1);
            setIsFlipping(false);
            setFlipDirection(null);
          }, 600);
        }
      };

      const prevPage = () => {
        if (currentSpread > 0 && !isFlipping) {
          setFlipDirection('prev');
          setIsFlipping(true);
          setTimeout(() => {
            setCurrentSpread(currentSpread - 1);
            setIsFlipping(false);
            setFlipDirection(null);
          }, 600);
        }
      };

      const handleMouseDown = (e) => {
        if (currentSpread < getMaxSpread()) {
          setIsDragging(true);
          dragStartX.current = e.clientX || e.touches?.[0]?.clientX;
          setDragProgress(0);
        }
      };

      const handleMouseMove = (e) => {
        const clientX = e.clientX || e.touches?.[0]?.clientX;

        if (isDragging && dragStartX.current) {
          const deltaX = dragStartX.current - clientX;
          const progress = Math.max(0, Math.min(deltaX / 300, 1));
          setDragProgress(progress);
        }
      };

      const handleMouseUp = () => {
        if (isDragging) {
          if (dragProgress > 0.5) {
            nextPage();
          }
          setIsDragging(false);
          setDragProgress(0);
        }
      };

      useEffect(() => {
        if (mode === 'viewer') {
          document.addEventListener('mousemove', handleMouseMove);
          document.addEventListener('touchmove', handleMouseMove);
          document.addEventListener('mouseup', handleMouseUp);
          document.addEventListener('touchend', handleMouseUp);

          return () => {
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('touchmove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);
            document.removeEventListener('touchend', handleMouseUp);
          };
        }
      }, [mode, isDragging, dragProgress, currentSpread]);

      const formatFileSize = (bytes) => {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      };

      const formatDate = (timestamp) => {
        return new Date(timestamp).toLocaleString('ko-KR');
      };

      if (mode === 'list') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-6xl mx-auto">
              <div className="bg-white rounded-2xl shadow-2xl p-6 mb-6">
                <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
                  <div className="flex items-center gap-3">
                    <BookOpen className="w-8 h-8 text-indigo-600" />
                    <h1 className="text-2xl md:text-3xl font-bold text-gray-800">PDF 플립북 라이브러리</h1>
                  </div>
                  <button
                    onClick={() => setMode('admin')}
                    className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl flex items-center gap-2 transition-colors shadow-lg"
                  >
                    <Plus className="w-5 h-5" />
                    PDF 등록
                  </button>
                </div>

                {loading ? (
                  <div className="text-center py-12">
                    <div className="animate-spin rounded-full h-16 w-16 border-4 border-indigo-600 border-t-transparent mx-auto mb-4"></div>
                    <p className="text-gray-600">로딩중...</p>
                  </div>
                ) : pdfList.length === 0 ? (
                  <div className="text-center py-12">
                    <BookOpen className="w-24 h-24 text-gray-300 mx-auto mb-4" />
                    <p className="text-gray-600 text-lg">등록된 PDF가 없습니다.</p>
                    <p className="text-gray-500 mt-2">PDF 등록 버튼을 눌러 첫 번째 PDF를 추가해보세요!</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {pdfList.map((pdf) => (
                      <div key={pdf.key} className="bg-gradient-to-br from-amber-50 to-orange-50 rounded-xl p-5 shadow-lg hover:shadow-xl transition-shadow border border-amber-200">
                        <div className="flex items-start justify-between mb-3">
                          <BookOpen className="w-12 h-12 text-amber-600" />
                          <button
                            onClick={() => handleDelete(pdf.key)}
                            className="text-red-500 hover:text-red-700 p-2 hover:bg-red-50 rounded-lg transition-colors"
                          >
                            <Trash2 className="w-5 h-5" />
                          </button>
                        </div>
                        <h3 className="font-bold text-gray-800 mb-2 truncate" title={pdf.name}>
                          {pdf.name}
                        </h3>
                        <p className="text-sm text-gray-600 mb-1">크기: {formatFileSize(pdf.size)}</p>
                        <p className="text-xs text-gray-500 mb-4">{formatDate(pdf.uploadedAt)}</p>
                        <button
                          onClick={() => handleViewPdf(pdf)}
                          className="w-full bg-amber-600 hover:bg-amber-700 text-white py-2 px-4 rounded-lg transition-colors font-semibold"
                        >
                          플립북으로 보기
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      if (mode === 'admin') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
              <div className="mb-6">
                <div className="w-24 h-24 mx-auto bg-indigo-100 rounded-full flex items-center justify-center mb-4">
                  <Upload className="w-12 h-12 text-indigo-600" />
                </div>
                <h1 className="text-2xl font-bold text-gray-800 mb-2 text-center">PDF 등록</h1>
                <p className="text-gray-600 text-center">업로드한 PDF는 브라우저에 저장됩니다</p>
              </div>
              
              <input
                ref={fileInputRef}
                type="file"
                accept="application/pdf"
                onChange={handleAdminUpload}
                className="hidden"
              />
              
              <button
                onClick={() => fileInputRef.current?.click()}
                disabled={loading}
                className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 text-white font-semibold py-4 px-6 rounded-xl transition-colors shadow-lg mb-4"
              >
                {loading ? '업로드 중...' : 'PDF 파일 선택하기'}
              </button>

              <button
                onClick={() => setMode('list')}
                className="w-full text-indigo-600 hover:text-indigo-700 underline"
              >
                목록으로 돌아가기
              </button>
            </div>
          </div>
        );
      }

      const leftPage = getLeftPage();
      const rightPage = getRightPage();
      const isCover = currentSpread === 0;
      const dragRotation = isDragging ? -180 * dragProgress : 0;
      const flipRotation = flipDirection === 'next' ? -180 : flipDirection === 'prev' ? 180 : 0;

      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 to-orange-100 flex flex-col items-center justify-center p-4">
          <div className="mb-6 text-center">
            <h1 className="text-xl md:text-2xl font-bold text-gray-800 mb-2">{selectedPdf?.name}</h1>
            <p className="text-gray-600">
              {isCover ? '표지' : `${currentSpread * 2}-${currentSpread * 2 + 1}페이지`} / 전체 {pages.length}페이지
            </p>
          </div>

          <div 
            ref={containerRef}
            className="relative select-none" 
            style={{ perspective: '2000px' }}
          >
            <div className="flex gap-1 relative">
              <div
                className={`relative bg-white transition-all duration-600 ${isCover ? 'opacity-0' : ''}`}
                style={{
                  width: isCover ? '0' : '45vw',
                  maxWidth: isCover ? '0' : '400px',
                  aspectRatio: '0.7',
                  transformOrigin: 'right center',
                  transformStyle: 'preserve-3d',
                  boxShadow: leftPage ? '0 10px 40px rgba(0,0,0,0.3), inset -5px 0 20px rgba(0,0,0,0.1)' : 'none'
                }}
              >
                {leftPage && (
                  <img
                    src={leftPage}
                    alt="Left page"
                    className="w-full h-full object-contain rounded-l-lg"
                  />
                )}
              </div>

              {!isCover && (
                <div 
                  style={{
                    width: '8px',
                    background: 'linear-gradient(to right, rgba(0,0,0,0.3), rgba(0,0,0,0.1), rgba(0,0,0,0.3))',
                    boxShadow: 'inset 0 0 10px rgba(0,0,0,0.5)'
                  }}
                />
              )}

              <div
                className="relative bg-white cursor-pointer"
                onMouseDown={handleMouseDown}
                onTouchStart={handleMouseDown}
                style={{
                  width: isCover ? '90vw' : '45vw',
                  maxWidth: isCover ? '600px' : '400px',
                  aspectRatio: '0.7',
                  transformOrigin: 'left center',
                  transformStyle: 'preserve-3d',
                  transform: `rotateY(${isDragging ? dragRotation : (isFlipping ? flipRotation : 0)}deg)`,
                  transition: isDragging ? 'none' : 'transform 0.6s ease-in-out, width 0.3s',
                  boxShadow: `0 10px 40px rgba(0,0,0,0.3), inset 5px 0 20px rgba(0,0,0,${isDragging ? 0.2 * dragProgress : 0.1})`
                }}
              >
                {rightPage && (
                  <>
                    <img
                      src={rightPage}
                      alt={isCover ? 'Cover' : 'Right page'}
                      className={`w-full h-full object-contain ${isCover ? 'rounded-lg' : 'rounded-r-lg'}`}
                    />
                    <div 
                      className="absolute inset-0 pointer-events-none rounded-r-lg"
                      style={{
                        background: `linear-gradient(to left, rgba(0,0,0,${0.3 * (isDragging ? dragProgress : 0)}), transparent 30%)`,
                        opacity: isDragging || isFlipping ? 1 : 0,
                        transition: 'opacity 0.3s'
                      }}
                    />
                  </>
                )}
              </div>
            </div>
          </div>

          <div className="flex gap-4 mt-8">
            <button
              onClick={prevPage}
              disabled={currentSpread === 0 || isFlipping}
              className="bg-amber-600 hover:bg-amber-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white p-4 rounded-full shadow-lg transition-colors"
            >
              <ChevronLeft className="w-6 h-6" />
            </button>
            <button
              onClick={nextPage}
              disabled={currentSpread >= getMaxSpread() || isFlipping}
              className="bg-amber-600 hover:bg-amber-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white p-4 rounded-full shadow-lg transition-colors"
            >
              <ChevronRight className="w-6 h-6" />
            </button>
          </div>

          <button
            onClick={() => {
              setMode('list');
              setSelectedPdf(null);
              setPages([]);
              setCurrentSpread(0);
            }}
            className="mt-6 text-amber-600 hover:text-amber-700 underline"
          >
            목록으로 돌아가기
          </button>
        </div>
      );
    }

    // 앱 시작
    window.addEventListener('load', () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<PDFFlipbookPlatform />);
      
      setTimeout(() => {
        document.getElementById('splash').classList.add('hidden');
      }, 1000);
    });
  </script>
</body>
</html>
